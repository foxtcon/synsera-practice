<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex,nofollow">
<meta name="description" content="Synsera Microsoft Security Practice, delivered with Foxtcon One. Senior-led Microsoft security behind the Synsera brand, from complimentary Health Check to managed operations.">
<title>Synsera | Microsoft Security Practice &amp; Program</title>
<style>
  :root{
    --red:#D81E05;--red2:#B31604;--orange:#F7941D;--orange2:#F26522;--sgrad:linear-gradient(90deg,var(--orange),var(--red));
    --azure:#1C86C9;--azure-d:#1568A6;--azure-l:#3AA8E0;--azure-soft:#E9F3FB;--navy:#0D1B2A;--navy2:#16283C;
    --ink:#1B1F24;--slate:#5A6470;--muted:#6B7580;--bg:#FFFFFF;--soft:#FBF4F1;--soft2:#F7F8FA;--line:#E7E9EC;--green:#2E9E7B;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;line-height:1.5}
  a{color:inherit;text-decoration:none}
  /* ===== SIDEBAR ===== */
  .side{position:fixed;top:0;left:0;bottom:0;width:274px;background:var(--navy);color:#c2ced7;display:flex;flex-direction:column;z-index:50}
  .side .brand{padding:20px 20px 15px;border-bottom:1px solid rgba(255,255,255,.09)}
  .side .slogo{display:flex;align-items:center;gap:8px}
  .side .slogo .w{font-size:28px;font-weight:800;color:#fff;font-style:italic;letter-spacing:-.5px}
  .side .sub{font-size:9px;letter-spacing:1.7px;text-transform:uppercase;color:#8fa8b8;margin-top:11px}
  .side .partner{display:block;margin-top:15px;font-size:9.5px;letter-spacing:1.2px;text-transform:uppercase;color:#7f95a4}
  .side .fxreal{background:#fff;border-radius:9px;padding:9px 14px;display:inline-flex;align-items:center;margin-top:7px;box-shadow:0 4px 14px rgba(0,0,0,.22)}
  .side .fxreal img{height:32px;width:auto;display:block}
  .side .fxreal b{color:var(--navy);font-weight:800;font-size:16px;letter-spacing:.3px}
  .side .slogo .w{text-shadow:0 1px 2px rgba(0,0,0,.2)}
  nav{flex:1;overflow-y:auto;padding:10px 10px 16px}
  nav::-webkit-scrollbar{width:6px}nav::-webkit-scrollbar-thumb{background:rgba(255,255,255,.14);border-radius:3px}
  .navgroup{margin-bottom:3px}
  .ngh{display:flex;align-items:center;gap:8px;width:100%;text-align:left;font:inherit;font-size:10px;letter-spacing:1.2px;text-transform:uppercase;font-weight:800;color:#7f95a4;background:none;border:none;padding:12px 12px 7px;cursor:pointer}
  .ngh .cr{margin-left:auto;font-size:9px;transition:.2s;opacity:.7}
  .navgroup.collapsed .cr{transform:rotate(-90deg)}
  .navgroup.collapsed .nitems{display:none}
  .nitems{display:flex;flex-direction:column;gap:1px;padding-bottom:5px}
  .nitem{display:flex;align-items:center;gap:9px;text-align:left;font:inherit;font-size:13px;color:#c2ced7;background:none;border:none;border-left:2px solid transparent;padding:8px 12px;margin-left:6px;cursor:pointer;border-radius:0 7px 7px 0;transition:.12s;line-height:1.2}
  .nitem:hover{background:rgba(255,255,255,.05);color:#fff}
  .nitem.active{background:rgba(28,169,201,.16);color:#fff;border-left-color:var(--azure-l)}
  .nitem .dot{width:6px;height:6px;border-radius:50%;background:#3a4a5a;flex:none}
  .nitem.active .dot{background:var(--azure-l)}
  .nitem.red.active{background:rgba(216,30,5,.18);border-left-color:var(--orange)}.nitem.red.active .dot{background:var(--orange)}
  .nitem.free .dot{background:var(--green)}.nitem.opt .dot{background:#6b7883}
  .side .foot{padding:13px 16px;border-top:1px solid rgba(255,255,255,.09)}
  .side .foot button{width:100%;font:inherit;font-size:13px;font-weight:700;background:var(--red);color:#fff;border:none;padding:11px;border-radius:9px;cursor:pointer}
  .side .foot button:hover{background:var(--red2)}
  .side .foot p{margin-top:9px;font-size:9.5px;color:#6f8393;line-height:1.5}
  /* ===== MAIN ===== */
  main{margin-left:274px}
  .topbar{position:sticky;top:0;z-index:40;background:rgba(255,255,255,.95);backdrop-filter:blur(8px);border-bottom:1px solid var(--line);padding:12px 44px;display:flex;align-items:center;gap:12px;font-size:12px;color:var(--muted)}
  .topbar .crumb{font-weight:700;color:var(--ink)}
  .topbar .tag{margin-left:auto;font-size:10.5px;letter-spacing:.5px;color:var(--muted)}
  .topbar .tag b{color:var(--slate)}
  .pane{padding:40px 44px 70px;max-width:1080px;animation:fade .25s ease}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  .kick{display:inline-block;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-bottom:14px}
  .kick.red{color:var(--red)}.kick.az{color:var(--azure-d)}
  h1{font-size:40px;line-height:1.07;letter-spacing:-.8px;font-weight:800}
  h1 .g{background:var(--sgrad);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
  h2{font-size:29px;line-height:1.13;letter-spacing:-.4px;font-weight:800}
  p.lead{font-size:17px;line-height:1.6;color:var(--slate);max-width:760px;margin-top:14px}
  .muted{color:var(--muted)}
  .abar{width:56px;height:5px;border-radius:3px;margin-bottom:20px}
  .abar.red{background:var(--sgrad)}.abar.az{background:linear-gradient(90deg,var(--azure-l),var(--azure-d))}
  .ctas{display:flex;gap:12px;margin-top:26px;flex-wrap:wrap}
  .btn{font:inherit;font-size:14px;font-weight:600;padding:12px 20px;border-radius:9px;cursor:pointer;border:1px solid transparent}
  .btn.red{background:var(--red);color:#fff}.btn.red:hover{background:var(--red2)}
  .btn.ghost{background:#fff;border-color:var(--line);color:var(--ink)}.btn.ghost:hover{border-color:var(--azure);color:var(--azure-d)}
  .free{display:inline-flex;align-items:center;gap:9px;margin-top:22px;font-size:14px;color:var(--slate);background:var(--soft);border:1px solid #f0ddd6;border-radius:24px;padding:9px 16px}.free b{color:var(--red)}
  /* pillars */
  .hint{font-size:12.5px;color:var(--muted);margin:8px 0 0}
  .pill-g{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:22px}
  .pl{background:var(--bg);border:1px solid var(--line);border-radius:12px;padding:15px 16px;display:flex;gap:12px;align-items:flex-start;transition:.15s;cursor:pointer}
  .pl:hover{border-color:var(--red);box-shadow:0 8px 22px rgba(216,30,5,.07);transform:translateY(-2px)}
  .pl.az:hover{border-color:var(--azure);box-shadow:0 8px 22px rgba(28,134,201,.07)}
  .pl .bg{width:32px;height:32px;border-radius:9px;background:var(--soft);color:var(--red);font-size:11.5px;font-weight:800;display:flex;align-items:center;justify-content:center;flex:none}
  .pl.az .bg{background:var(--azure-soft);color:var(--azure-d)}
  .pl h4{font-size:14px;color:var(--ink);margin-bottom:2px}.pl span{font-size:11.5px;color:var(--muted);line-height:1.4}
  .pl .arm{margin-left:auto;color:var(--red);font-weight:700;opacity:0;transition:.15s;font-size:16px;align-self:center}
  .pl:hover .arm{opacity:1}
  /* cards generic */
  .g3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-top:24px}
  .g2{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;margin-top:24px}
  .card{background:var(--bg);border:1px solid var(--line);border-radius:13px;padding:20px}
  .card h3{font-size:16px;color:var(--ink);margin-bottom:7px;display:flex;align-items:center;gap:9px}
  .card p{font-size:13.5px;line-height:1.55;color:var(--muted)}
  .num{width:26px;height:26px;border-radius:8px;color:#fff;font-size:13px;font-weight:700;display:inline-flex;align-items:center;justify-content:center;flex:none}
  .num.red{background:var(--red)}.num.az{background:var(--azure)}
  .ind{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin-top:24px}
  .ic{background:var(--bg);border:1px solid var(--line);border-radius:12px;padding:18px;border-left:4px solid var(--red)}
  .ic:nth-child(2n){border-left-color:var(--orange)}
  .ic b{font-size:14px;color:var(--ink);display:block;margin-bottom:5px}.ic span{font-size:12.5px;color:var(--slate);line-height:1.5}
  /* sizing tiers */
  .tiers{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-top:18px}
  .tier{border:1px solid var(--line);border-top:3px solid var(--azure);border-radius:9px;padding:11px 10px;text-align:center;background:var(--soft2)}
  .tier b{font-size:14px;color:var(--ink);display:block}.tier span{font-size:9.5px;color:var(--muted);display:block;line-height:1.35;margin-top:3px}
  /* stage cards (rich) */
  .stagecards{display:grid;grid-template-columns:repeat(3,1fr);gap:13px;margin-top:22px}
  .stc{background:#fff;border:1px solid var(--line);border-radius:12px;padding:17px 16px;border-top:4px solid var(--azure);cursor:pointer;transition:.15s;position:relative;display:flex;flex-direction:column}
  .stc:hover{transform:translateY(-3px);box-shadow:0 14px 30px rgba(28,134,201,.14);border-color:var(--azure)}
  .stc.free{border-top-color:var(--green)}.stc.opt{border-top-color:#6b7883}
  .stc .n{font-size:9px;letter-spacing:.8px;text-transform:uppercase;color:var(--muted);font-weight:800}
  .stc b{display:block;font-size:16px;color:var(--ink);margin:3px 0 3px;line-height:1.15}
  .stc .sub{font-size:11px;color:var(--azure-d);font-weight:700;margin-bottom:8px}
  .stc.free .sub{color:var(--green)}.stc.opt .sub{color:#6b7883}
  .stc .sd{font-size:11.5px;color:var(--muted);line-height:1.42;flex:1;margin-bottom:10px}
  .stc .tg{font-size:8.5px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;color:#fff;padding:2px 7px;border-radius:4px;display:inline-block;background:var(--azure);align-self:flex-start}
  .stc.free .tg{background:var(--green)}.stc.opt .tg{background:#6b7883}
  .stc .vd{margin-top:11px;font-size:11px;color:var(--azure-d);font-weight:700}
  .stc .join{position:absolute;top:11px;right:11px;font-size:7.5px;font-weight:800;letter-spacing:.4px;text-transform:uppercase;color:var(--azure-d);background:var(--azure-soft);border-radius:4px;padding:2px 6px}
  .joinbar{display:flex;align-items:center;gap:12px;background:var(--azure-soft);border:1px solid #cde5f6;border-left:4px solid var(--azure);border-radius:10px;padding:14px 17px;margin-top:18px;font-size:14px;color:var(--ink)}.joinbar b{color:var(--azure-d)}
  /* stage detail */
  .mcols{display:grid;grid-template-columns:300px 1fr;gap:24px;margin-top:14px}
  .st{font-size:11.5px;font-weight:700;color:#fff;padding:3px 9px;border-radius:5px;display:inline-block;margin-bottom:12px}
  .lbl2{font-size:10.5px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin:16px 0 9px}
  .lbl2:first-child{margin-top:0}
  ul.ck{list-style:none;padding:0}
  ul.ck li{font-size:13.5px;color:var(--ink);line-height:1.5;padding-left:21px;position:relative;margin-bottom:8px}
  ul.ck li:before{content:"\2713";color:var(--azure-d);font-weight:800;position:absolute;left:0}
  .deliv{background:var(--azure-soft);border-radius:10px;padding:13px 15px;margin-top:14px;font-size:13.5px;color:var(--ink)}
  .deliv b{color:var(--azure-d);display:block;font-size:10.5px;letter-spacing:.5px;text-transform:uppercase;margin-bottom:4px}
  .samplelink{display:inline-block;margin-top:14px;background:var(--azure);color:#fff;font-size:13px;font-weight:600;padding:11px 18px;border-radius:9px;text-decoration:none;transition:.15s}
  .samplelink:hover{background:var(--azure-d)}
  .docmodal{display:none;position:fixed;inset:0;background:rgba(13,27,42,.7);z-index:85;backdrop-filter:blur(2px);padding:24px}
  .docmodal.on{display:flex;align-items:flex-start;justify-content:center}
  .docwrap{position:relative;width:min(970px,96vw);height:92vh;background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 30px 80px rgba(0,0,0,.4);margin-top:2vh}
  .docwrap iframe{width:100%;height:100%;border:none}
  .docx{position:absolute;top:10px;right:12px;z-index:2;width:34px;height:34px;border-radius:8px;border:none;background:#16202B;color:#fff;font-size:20px;cursor:pointer;box-shadow:0 4px 12px rgba(0,0,0,.3)}
  @media print{.docmodal{display:none!important}}
  .valuebox{background:linear-gradient(90deg,#fdf3e6,#fbeae4);border:1px solid #f3d5b8;border-radius:10px;padding:13px 16px}
  .valuebox .vl{font-size:9.5px;font-weight:800;letter-spacing:.8px;text-transform:uppercase;color:var(--orange2);margin-bottom:3px}
  .valuebox p{font-size:13.5px;color:var(--ink);line-height:1.45;margin:0}
  /* artifact + charts */
  .artifact{border:1px solid var(--line);border-radius:10px;overflow:hidden;box-shadow:0 10px 26px rgba(20,20,24,.1);background:#fff}
  .artifact .ahead{background:var(--red);padding:11px 13px;display:flex;align-items:center;justify-content:space-between}
  .artifact .ahead .sw{font-size:13px;font-weight:800;font-style:italic;color:#fff}
  .artifact .ahead .tp{font-size:7.5px;letter-spacing:.8px;text-transform:uppercase;color:#ffd9d1;font-weight:700}
  .artifact .abody{padding:14px}
  .artifact .atitle{font-size:12.5px;font-weight:800;color:var(--ink);margin-bottom:10px;line-height:1.2}
  .acap{font-size:10px;color:var(--slate);font-style:italic;margin-top:7px;padding-top:6px;border-top:1px dashed var(--line)}
  .gl,.pl2,.rl{color:var(--slate)!important}
  .gbar .gl{font-size:8.5px}.prog .pl2{font-size:8.5px}.scard .rl{font-size:8.5px}
  .artnote{font-size:10.5px;color:var(--muted);margin-top:8px}
  .gauge{display:flex;gap:12px;align-items:center;margin:2px 0 4px}
  .gring{width:64px;height:64px;border-radius:50%;background:conic-gradient(var(--red) 0 68%,#f0d9d4 68%);display:flex;align-items:center;justify-content:center;flex:none}
  .gring i{width:46px;height:46px;border-radius:50%;background:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;font-style:normal}
  .gring i b{font-size:15px;color:var(--red);font-weight:800;line-height:1}.gring i span{font-size:6px;letter-spacing:.3px;text-transform:uppercase;color:var(--muted);margin-top:1px}
  .gbars{flex:1}.gbar{display:flex;align-items:center;gap:6px;margin-bottom:4px}
  .gbar .gl{font-size:8px;color:var(--slate);width:48px;flex:none}
  .gbar .gt{flex:1;height:6px;background:#f0eceb;border-radius:3px;overflow:hidden}.gbar .gt i{display:block;height:100%;background:linear-gradient(90deg,var(--orange),var(--red))}
  .nnl{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;margin:2px 0 4px}
  .nnl .col{border:1px solid var(--line);border-radius:6px;padding:6px}
  .nnl .ch{font-size:7px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;color:#fff;border-radius:3px;padding:2px 5px;display:inline-block;margin-bottom:4px}
  .nnl .col:nth-child(1) .ch{background:var(--red)}.nnl .col:nth-child(2) .ch{background:var(--orange2)}.nnl .col:nth-child(3) .ch{background:var(--muted)}
  .nnl .chip{font-size:7.5px;color:var(--slate);background:var(--soft2);border-radius:3px;padding:2px 4px;margin-bottom:3px;display:block}
  .scard{margin:2px 0 4px}.scard .row{display:flex;align-items:center;gap:6px;margin-bottom:5px}
  .scard .rl{font-size:8px;color:var(--slate);width:52px;flex:none}
  .scard .rt{flex:1;height:7px;border-radius:4px;background:#f0eceb;overflow:hidden}.scard .rt i{display:block;height:100%}
  .bp{margin:2px 0 4px}.bp .layer{display:flex;gap:5px;justify-content:center;margin-bottom:5px}
  .bp .box{font-size:7.5px;color:var(--ink);background:var(--soft);border:1px solid #f0d9d4;border-radius:5px;padding:5px 6px;text-align:center;flex:1}
  .bp .core{background:var(--red);color:#fff;border-color:var(--red);font-weight:700}
  .prog{margin:2px 0 4px}.prog .pr{display:flex;align-items:center;gap:6px;margin-bottom:5px}
  .prog .pl2{font-size:8px;color:var(--slate);width:58px;flex:none}
  .prog .pt{flex:1;height:7px;background:#f0eceb;border-radius:4px;overflow:hidden}.prog .pt i{display:block;height:100%;background:linear-gradient(90deg,var(--orange),var(--red))}
  .prog .pv{font-size:8px;color:var(--red2);font-weight:700;width:26px;text-align:right}
  .trend svg{width:100%;height:50px;display:block}
  .trend .kpis{display:flex;gap:9px;margin-top:5px}.trend .kpi{font-size:8px;color:var(--slate)}.trend .kpi b{color:var(--red2)}
  /* usa/portal/roles */
  .usa{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-top:22px}
  .ub{background:var(--soft2);border:1px solid var(--line);border-radius:12px;padding:18px 19px;border-top:3px solid var(--azure)}
  .ub .em{font-size:20px;margin-bottom:8px}.ub b{font-size:14px;color:var(--ink);display:block;margin-bottom:5px}.ub p{font-size:12.5px;color:var(--slate);line-height:1.5}
  .portal{background:var(--navy);border-radius:14px;overflow:hidden;margin-top:22px}
  .portal .top{background:#12283a;padding:11px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid rgba(255,255,255,.08)}
  .portal .dots{display:flex;gap:6px}.portal .dots i{width:9px;height:9px;border-radius:50%;display:inline-block}
  .portal .dots i:nth-child(1){background:#e2564f}.portal .dots i:nth-child(2){background:#e2b14a}.portal .dots i:nth-child(3){background:#4fae6a}
  .portal .top b{color:#fff;font-size:12px}.portal .top .bd{margin-left:auto;font-size:9px;letter-spacing:1px;text-transform:uppercase;color:#8fd0ec;background:rgba(28,134,201,.2);border:1px solid rgba(58,168,224,.4);border-radius:5px;padding:3px 7px}
  .portal .screen{padding:18px 20px}
  .prow{display:flex;align-items:center;gap:12px;margin-bottom:13px}.prow .pj{color:#fff;font-size:13.5px;font-weight:700}.prow .cl{color:#8fa2ae;font-size:11.5px}.prow .stat{margin-left:auto;font-size:10.5px;font-weight:700;color:#04222b;background:#5fc8e8;border-radius:20px;padding:4px 11px}
  .track{display:flex;gap:5px}.tstep{flex:1;text-align:center}.tstep .bar{height:6px;border-radius:4px;background:#25384c}.tstep.done .bar{background:var(--azure-l)}.tstep.cur .bar{background:#fff}.tstep small{display:block;font-size:8px;color:#7f95a4;margin-top:5px}.tstep.cur small{color:#8fd0ec;font-weight:700}
  .next{margin-top:15px;background:rgba(28,134,201,.12);border:1px solid rgba(58,168,224,.3);border-radius:10px;padding:11px 14px}.next .lbl{font-size:9px;letter-spacing:1.2px;text-transform:uppercase;color:#8fd0ec;font-weight:700}.next p{color:#dbe6ec;font-size:12px;margin-top:3px}
  .roles{display:grid;grid-template-columns:repeat(2,1fr);gap:11px;margin-top:16px}
  .role{background:var(--soft2);border:1px solid var(--line);border-radius:10px;padding:13px 15px;border-left:3px solid var(--azure)}.role b{font-size:13px;color:var(--ink);display:block;margin-bottom:3px}.role span{font-size:12px;color:var(--muted);line-height:1.4}
  /* pillar modal */
  .poverlay{display:none;position:fixed;inset:0;background:rgba(27,20,20,.55);z-index:90;backdrop-filter:blur(2px)}
  .poverlay.on{display:block}
  .psheet{position:absolute;top:8vh;left:50%;transform:translateX(-50%);width:min(600px,92vw);max-height:82vh;overflow:auto;background:#fff;border-radius:16px;padding:28px 30px;box-shadow:0 30px 80px rgba(0,0,0,.3)}
  .psheet .x{position:absolute;top:15px;right:16px;width:30px;height:30px;border-radius:8px;border:1px solid var(--line);background:#fff;cursor:pointer;font-size:16px;color:var(--slate)}
  .psheet .code{width:44px;height:44px;border-radius:11px;background:var(--soft);color:var(--red);font-size:15px;font-weight:800;display:flex;align-items:center;justify-content:center;margin-bottom:12px}
  .psheet h3{font-size:23px;letter-spacing:-.3px;margin-bottom:8px}
  .psheet p.pd{font-size:14.5px;color:var(--slate);line-height:1.6;margin-bottom:6px}
  .psheet .lbl{font-size:10.5px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin:16px 0 9px}
  .psheet .svc{display:flex;flex-wrap:wrap;gap:6px}

    commercial:{kick:"Working together &middot; the commercial model",t:"Billing and the pipeline model",d:"A simple, flexible model. Foxtcon One is your delivery engine and invoices Synsera at a net rate; Synsera owns the client relationship and invoices the client, keeping the margin. Paid work can be day rate or fixed price under a Statement of Work. We size each number to the client's real environment. The goal is always the same: meet the client where they are, uncover the gaps, and align them to the Microsoft investment they already own.",custom:'<div class="lbl2" style="margin-top:6px">The billing flow</div><div class="bflow"><div class="bnode fox"><span class="bt">Delivery engine</span><b>Foxtcon One</b><span>Scopes and delivers under VJ</span></div><div class="barr"><b>&rarr;</b><span>invoices Synsera at a net rate</span></div><div class="bnode syn"><span class="bt">Your brand</span><b>Synsera</b><span>Owns the client, the SOW, and the commercials</span></div><div class="barr"><b>&rarr;</b><span>invoices the client, with your margin</span></div><div class="bnode client"><span class="bt">The customer</span><b>Client</b><span>Approves each SOW and the outcome</span></div></div><div class="lbl2" style="margin-top:26px">The pipeline flywheel</div><p class="lead" style="font-size:13.5px;margin-bottom:2px">One complimentary Health Check becomes a continuing pipeline. Each stage earns the next, and managed operations keep it turning, so you are not starting a new sales cycle every time.</p><div class="fwheel"><span class="fw free">Free Health Check</span><span class="fwsep">&rsaquo;</span><span class="fw">Discovery</span><span class="fwsep">&rsaquo;</span><span class="fw">Assessment</span><span class="fwsep">&rsaquo;</span><span class="fw">Architecture</span><span class="fwsep">&rsaquo;</span><span class="fw">Implementation</span><span class="fwsep">&rsaquo;</span><span class="fw hot">Manage + QBR</span></div><div class="fwloop"><span class="lp">&#8635;</span><span><b>The QBR is the engine of the relationship.</b> Every quarter we review the client\'s posture, show them the next gap to close, and that becomes the next scoped SOW. Trust compounds, the client stays, and your account keeps producing SOWs without a fresh sales cycle each time.</span></div>',pts:[{h:"One SOW per project",p:"Nothing starts without a signed Statement of Work that fixes scope, deliverables, timing, and price. The client only pays for what they agree, confirmed up front."},{h:"Priced to the environment",p:"We size each engagement to the client's real estate, seat count, and complexity, then land on the best number that aligns to the value, not a fixed list price."},{h:"Meet the client where they are",p:"They can start at the free Health Check or join further along. We uncover the gaps, align to their Microsoft investment, and only scope what moves them forward."},{h:"Recurring by design",p:"Managed operations and quarterly reviews turn a one-off project into an annuity, and each QBR seeds the next SOW, so the account keeps compounding."}],pos:"Transparent and low-risk for the client, and a compounding pipeline for Synsera: you keep the relationship and the margin, we keep the delivery current and the flywheel turning."},
    team:{t:"The delivery team",d:"VJ Barot is the Principal Architect and stays personally engaged on every project from start to end, with no hand-off. Under VJ, a team of certified experts across the USA and India delivers across the full MCRA.",pts:[{h:"VJ Barot, Principal Architect",p:"Leads architecture and assures delivery on every engagement, start to finish, with no hand-off."},{h:"Senior engineering",p:"Pranav Barot leads the technical build, detection, and automation."},{h:"Platform &amp; portal",p:"Dhairya Chandra builds the SaaS app, the partner and client portal, and delivery automation."},{h:"Certified experts, USA and India",p:"Skilled specialists per MCRA area, certified in their speciality, working under VJ's lead."}],pos:"Senior by default, continuous by design, and structured to scale to your next partner on the same framework."},
    breadth:{t:"Combined capability breadth",d:"Together, Synsera and Foxtcon can take a broad enterprise capability to your clients, beyond security alone, all delivered under your brand.",pts:[{h:"Microsoft Security &amp; Zero Trust",p:"Defender XDR, Sentinel, Entra, Intune, and the full MCRA."},{h:"Data governance &amp; compliance",p:"Purview, DLP, insider risk, and the new Data Security Posture Management."},{h:"AI &amp; Copilot readiness",p:"Get data and identity ready, then adopt Copilot and agents safely."},{h:"Intelligent automation &amp; agents",p:"Copilot Studio, Power Platform, and governed agentic automation."},{h:"Modern work &amp; cloud",p:"Microsoft 365 and Azure, secured and identity-first."},{h:"Custom applications &amp; platforms",p:"Bespoke apps, integration, and SaaS, engineered to fit."}],pos:"One partner across security, data, and AI, so the client has no reason to look anywhere else."},
    value:{kick:"The case",t:"Why partner, not build",d:"Standing up a senior, current Microsoft Security practice in-house is a major cost and a long ramp. Partnering gives Synsera the capability immediately, at no fixed cost, with your margin on top.",custom:'<div class="vcmp"><div class="vcol build"><div class="vh">Build it in-house</div><ul><li>Major first-year cost to hire, certify, and tool</li><li>Six to twelve months to ramp to quality</li><li>Recruit and retain a scarce senior architect</li><li>Maintain Microsoft currency yourselves</li><li>Fixed headcount and bench risk</li><li>High ramp, retention, and quality risk</li></ul></div><div class="vcol partner"><div class="vh">Partner with Foxtcon One</div><ul><li>No fixed cost, pay per project</li><li>Senior capability from day one</li><li>VJ on every engagement, 18-plus years</li><li>Kept current with Microsoft, to 2026</li><li>Flex per SOW, no idle cost</li><li>Proven, packaged, low risk</li><li>You add your margin on top</li></ul></div></div>',pts:[{h:"Immediate capability",p:"A full senior practice from day one, with no hiring or ramp."},{h:"No fixed overhead",p:"Pay per project on a net rate; you set the client price and keep the margin."},{h:"Current and certified",p:"Certified experts, kept fluent in Microsoft's 2026 roadmap for you."}],pos:"Faster, cheaper, and lower-risk than building it, so you win clients now and keep the margin."},
    faq:{t:"Frequently asked",d:"The questions your clients will ask, with straight answers you can give with confidence.",pts:[{h:"Who actually delivers the work?",p:"VJ Barot leads every engagement as Principal Architect, with no junior hand-off. Certified specialists across the USA and India deliver under that lead, behind the Synsera brand. Work stays inside the client tenant."},{h:"Where does our data go?",p:"It stays inside your own Microsoft tenant. Nothing is exfiltrated, and a DPA is in place."},{h:"How do we stay informed?",p:"A written summary after every session and stage, and the partner portal as it ships."},{h:"How fast can we start?",p:"Right away, with a complimentary Health Check that produces a Readiness Summary you keep."},{h:"Are you current with Microsoft?",p:"Yes. We track the roadmap continuously, so you get the 2026 capabilities, not last year's playbook."},{h:"Can you scale if we win bigger?",p:"Yes. Named specialists per pillar scale under VJ's lead, so larger wins stay senior-supervised without a junior body shop."}],pos:"Every answer removes a reason to hesitate, so the conversation moves to when, not whether."},
    whatsnew:{kick:"Current with Microsoft",t:"What's new from Microsoft Security, to 2026",d:"We keep the practice current with Microsoft's roadmap, so what you take to a client is this year's capability, not last year's. A snapshot of what is shaping the conversation now.",custom:'<div class="whatsnew-grid"><div class="wn"><div class="wh"><span class="ic">SO</span>Security Operations</div><ul><li>Microsoft Sentinel is now GA in the Defender portal, unifying SIEM and XDR</li><li>Sentinel data lake and SOC optimization cut cost and noise</li><li>A Security Analyst Agent investigates across Defender and Sentinel</li></ul></div><div class="wn"><div class="wh"><span class="ic">ID</span>Identity &amp; Agents</div><ul><li>Entra Agent ID GA (April 2026): AI agents as first-class identities</li><li>Conditional Access Optimization Agent closes policy gaps</li><li>Agent 365 + Microsoft 365 E7 for agent governance at scale</li></ul></div><div class="wn"><div class="wh"><span class="ic">DA</span>Data &amp; Purview</div><ul><li>Unified Purview DSPM GA (May 2026) for data and AI posture</li><li>AI observability inventories apps and Agent 365 agents</li><li>Security Copilot agents recommend remediation with approval</li></ul></div><div class="wn"><div class="wh"><span class="ic">AI</span>AI &amp; Copilot</div><ul><li>Security Copilot agents across Defender, Entra, Intune, Purview, and Sentinel</li><li>Agent 365 + Microsoft 365 E7 for agent governance at scale</li><li>Entra Agent ID GA (April 2026) before broad Copilot rollout</li></ul></div><div class="wn"><div class="wh"><span class="ic">IN</span>Cloud &amp; Workloads</div><ul><li>Defender for Cloud is the first CNAPP to secure AI workloads</li><li>Agentless container scanning and cross-cloud risk scoring</li><li>Attack-path analysis surfaced through Security Copilot</li></ul></div><div class="wn"><div class="wh"><span class="ic">EP</span>Endpoints</div><ul><li>Intune Vulnerability Remediation Agent with agentic identity</li><li>New STIG audit baseline for Windows</li><li>Tighter Defender and Intune device-risk compliance</li></ul></div></div>',pos:"You show up already fluent in the 2026 platform shift, which is exactly what makes a client trust you over a generalist."},
    whyfox:{kick:"Why Foxtcon",t:"Why this makes Synsera the obvious choice",d:"This is the case your team can carry into any client conversation. It is built so the client has no reason to look anywhere else.",pts:[{h:"Senior-led and accountable",p:"VJ leads and assures every engagement as Principal Architect. Certified specialists across the USA and India deliver under that lead. No junior hand-off, no anonymous bench."},{h:"Current with Microsoft, always",p:"We track the roadmap continuously, so clients get 2026 capabilities like Agent ID, DSPM, and unified SecOps."},{h:"Your brand, your client",p:"White-label to the client. The relationship, the commercials, and the sign-off stay with Synsera."},{h:"Flexible commercials, clear outcomes",p:"Day rate or fixed price under SOW. Packaged stages with clear deliverables, and a free Health Check that keeps the funnel full."},{h:"Proven, repeatable depth",p:"A refined methodology and accelerators behind every engagement, so the client gets consistent, high-quality outcomes."},{h:"One team, end to end",p:"PMO, architect, engineer, and account management in one place, so the client experience is handled start to finish."}],pos:"Together this keeps your sales funnel and SOW flow running, because the client sees one partner who can do all of it, properly, under your name."}

  const pane=document.getElementById('pane');
  function stagePanel(i){const s=stages[i];const DOC=["Synsera_Stage0_Readiness_Profile_Template.html","Synsera_Deliverable_1_HealthCheck.html","Synsera_Deliverable_Discovery.html","Synsera_Deliverable_2_Envisioning.html","Synsera_Deliverable_3_Assessment.html","Synsera_Deliverable_4_Architecture.html","Synsera_Deliverable_5_Implementation.html","Synsera_Deliverable_6_Managed.html"];const EX=[["Licensing and entitlements","High-level posture signals across the pillars"],["Live posture across the nine pillars","E5 capability utilisation","Top risks and quick wins"],["Business outcomes and drivers","Regulatory and sector pressures","Current-state and priorities"],["Solution plays and target scenarios","Microsoft funding eligibility","Roadmap direction"],["Control-level posture on the priority pillars","Configuration and policy gaps","Compliance and framework alignment"],["Target-state design options","Sequencing and dependencies","Investment and licensing fit"],["Configuration and deployment","Validation against the design","Enablement and handover"],["Ongoing detections and posture drift","Trends over time","Next-quarter priorities"]][i]||[];return `<span class="kick az">MCRA services path &middot; stage ${i+1} of ${stages.length} &middot; going deeper</span><h2>${s.t}</h2><span class="st" style="background:${s.tagc}">${s.tag}</span><p class="lead" style="margin-top:8px">${s.d}</p><div class="mcols"><div><div class="lbl2">The outcome your client sees</div>${artifact(s.art)}<p class="artnote">Illustrative outcome under the Synsera brand, delivered by Foxtcon One. Each deliverable shows where the client stands and the recommended next step, aligned to their Microsoft investment.</p></div><div><div class="valuebox"><div class="vl">Value at this stage</div><p>${s.value}</p></div><div class="lbl2">What we do</div><ul class="ck">${s.does.map(x=>`<li>${x}</li>`).join('')}</ul><div class="lbl2">What we explore in the environment</div><ul class="ck">${EX.map(x=>`<li>${x}</li>`).join('')}</ul></div></div><div class="stagemeta"><div class="sm"><b>Who leads</b><span>${s.who}</span></div><div class="sm"><b>Timing</b><span>${s.timing}</span></div><div class="sm"><b>Commercial</b><span>${s.commercial}</span></div></div><div class="g2" style="margin-top:14px"><div class="jbox client"><b>Client receives</b>${s.clientGets}</div><div class="jbox syn"><b>Synsera receives</b>${s.synGets}</div></div><div class="deliv" style="margin-top:14px"><b>Deliverable</b>${s.del}</div>${DOC[i]?`<a class="samplelink" href="${DOC[i]}" onclick="openDoc('${DOC[i]}');return false">&#128196; View the sample deliverable this client receives &rarr;</a>`:''}`;}
  function richPanel(r){
    let h=`<div class="abar az"></div><span class="kick az">${r.kick||'For the Synsera team'}</span><h2>${r.t}</h2><p class="lead">${r.d}</p>`;

  function CONTENT(id){
    if(id==='welcome')return `<span class="kick red">Prepared for Shehbaz, Juber, and the Synsera team</span><h1>Your Microsoft Security <span class="g">delivery engine.</span></h1><p class="lead">Thank you for the trust and the momentum. This hub is what I promised on our call: the client-facing practice in Synsera branding, and the end-to-end program so your team and mine stay aligned from the first client. Foxtcon One is here to become Synsera's Microsoft Security delivery engine, white-label to your clients. You own the relationship and the pipeline. We power senior delivery behind your brand, starting with a few key accounts and fine-tuning before we scale.</p><div class="valuebox" style="margin-top:18px"><div class="vl">First pipeline opportunity</div><p><b>Cole Technologies</b> (~10,000 licences, E5 underused, DLP and labelling pain, Copilot blocked on foundations) is the natural first engagement. We recommend a mock delivery session with your internal team first, then the formal client presentation.</p></div><div class="g2" style="margin-top:24px"><div class="card"><h3><span class="num red">1</span>You own the client</h3><p>Synsera owns the relationship, the commercials, and the sign-off. Client-facing work is seamless under your brand. Foxtcon One is the delivery engine behind it, senior-led by VJ.</p></div><div class="card"><h3><span class="num red">2</span>Built for how Synsera sells</h3><p>Your site leads on governance-led AI, Purview, Copilot readiness, and agents. This practice completes that story with the full Microsoft Security depth clients need when AI and data meet the real world.</p></div><div class="card"><h3><span class="num red">3</span>Pipeline, not one-off projects</h3><p>Free Health Check to Discovery to scoped SOWs to Manage. Every quarterly review surfaces the next gap, so Cole Technologies and every account after it keep producing work under Synsera.</p></div><div class="card"><h3><span class="num red">4</span>How to explore</h3><p>Start with Fit with Synsera, walk the eight-stage program and sample deliverables, then open any of the nine MCRA pillars for what is current from Microsoft in 2026.</p></div></div><div class="ctas"><button class="btn red" onclick="pick('synfit')">See how this fits Synsera</button><button class="btn ghost" onclick="pick('example')">See the client journey</button><button class="btn ghost" onclick="pick('site')">Preview the client page</button></div>`;
    if(id==='synfit')return `<div class="abar red"></div><span class="kick red">Partnership fit</span><h2>How Foxtcon completes what Synsera already sells</h2><p class="lead">Synsera leads with governance-led AI adoption: Data Governance, Copilot readiness, and agents done properly. Foxtcon One is the Microsoft Security delivery engine behind that promise, so when a client like Cole Technologies needs depth beyond advisory, Synsera still owns the room.</p><div class="g3" style="margin-top:22px"><div class="card"><h3><span class="num red">1</span>Synsera Data Governance</h3><p>Maps to Purview, labels, DLP, Insider Risk, and unified DSPM. We implement proportionately, the way your brand already sells it.</p></div><div class="card"><h3><span class="num red">2</span>Synsera AI &amp; Copilot Readiness</h3><p>Maps to Copilot readiness, Purview AI observability, oversharing remediation, and safe rollout sequencing before broad enablement.</p></div><div class="card"><h3><span class="num red">3</span>Synsera Agents &amp; Automation</h3><p>Maps to Entra Agent ID, Agent 365, Conditional Access for agents, and guardrails so automation stays auditable and trusted.</p></div></div><div class="abar az" style="margin-top:36px"></div><span class="kick az">Beyond Purview alone</span><h2>Full Microsoft Security breadth, under your brand</h2><p class="lead">You asked for more than a Purview or DLP page. This practice covers all nine MCRA pillars: identity, endpoints, apps, data, infrastructure, network, AI, people and compliance, and security operations through to managed SOC. That is the breadth clients expect from a serious Microsoft security partner.</p>${pillarGrid(false)}<div class="abar az" style="margin-top:36px"></div><span class="kick az">AI synergy</span><h2>Your AI strength, our Microsoft Security depth</h2><p class="lead">Synsera brings AI and automation expertise. Foxtcon integrates Security Copilot, Sentinel automation, Entra Agent ID, and custom agents into the Microsoft Security stack so Copilot and agent programmes sit on real foundations.</p><div class="g2" style="margin-top:18px"><div class="card"><h3>Microsoft-first architecture</h3><p>We design and deliver on Microsoft Security. When a control is better served outside the Microsoft estate, for example PAM or IGA with CyberArk, BeyondTrust, or SailPoint, Synsera's partner ecosystem fills the gap. Foxtcon stays the Microsoft Security delivery engine and designs how it fits.</p></div><div class="card"><h3>Start small, then scale</h3><p>Fine-tune on a few key clients. Prove the Health Check to Envisioning to White Glove Assessment path. Then expand the pipeline with confidence.</p></div></div><div class="valuebox" style="margin-top:22px"><div class="vl">What Synsera gains</div><p>A senior delivery bench you can take to market immediately, flexible day-rate or fixed-price commercials under SOW, a free Health Check that fills the funnel, and a recurring Manage motion that turns one win into a pipeline.</p></div><div class="ctas"><button class="btn red" onclick="pick('first')">Line up Cole Technologies</button><button class="btn ghost" onclick="pick('lifecycle')">See the eight-stage program</button><button class="btn ghost" onclick="bookCall()">Book the mock session</button></div>`;
    if(id==='first')return `<div class="abar red"></div><span class="kick red">First client to fine-tune the partnership</span><h2>Cole Technologies</h2><p class="lead">We start with a few key clients and fine-tune before we scale. Cole Technologies is the natural first joint engagement: Synsera owns the relationship; Foxtcon One delivers Microsoft Security under your brand.</p><div class="clientcard"><div class="cc"><b>Cole Technologies</b><span>About 10,000 licences &middot; 6 to 7k active users and contractors &middot; E5</span></div><div class="m"><div><b>&lt;40%</b><span>E5 used</span></div><div><b>DLP</b><span>labelling gap</span></div><div><b>Copilot</b><span>needs foundations</span></div></div></div><div class="g2" style="margin-top:22px"><div class="card"><h3><span class="num red">1</span>What we heard</h3><p>E5 underutilisation. Pain in DLP, sensitivity labelling, and communication compliance. Security foundations are the prerequisite to a confident Copilot rollout, not an optional extra.</p></div><div class="card"><h3><span class="num red">2</span>What Cole receives</h3><p>A complimentary, interview-based Health Check across the nine MCRA pillars, E5 utilisation called out clearly, and a board-ready Security Readiness Summary they keep.</p></div><div class="card"><h3><span class="num az">3</span>What Synsera receives</h3><p>A live proof point, a natural path into Envisioning and White Glove Assessment, and a commercial model you control. Start small, learn fast, then scale.</p></div><div class="card"><h3><span class="num az">4</span>Recommended path</h3><p>Pre-Health Check (about 60 min) to Health Check (45 to 60 min) to Envisioning to White Glove Assessment to Implementation, with Manage optional for ongoing posture.</p></div></div><div class="valuebox" style="margin-top:22px"><div class="vl">Suggested next step with Synsera</div><p>Run a <b>mock delivery session</b> with Synsera's internal team first. Align on the Health Check flow, the Readiness Summary, and the ask. Then take the formal presentation to Cole Technologies with confidence.</p></div><div class="offer" style="margin-top:24px"><div class="offer-l"><div class="ot">Ask for Cole Technologies</div><ul class="ck"><li>Complimentary Microsoft Security Health Check with Synsera</li><li>45 to 60 minute interview-based session with a principal architect</li><li>Nine-pillar score focused on DLP, labelling, compliance, and Copilot readiness</li><li>No cost, no obligation, clear next step</li></ul></div><div class="offer-r"><div class="obig">&pound;0</div><div class="osub">Health Check to open the account</div><button class="btn red" onclick="healthCheck()">Request Cole Health Check</button></div></div><div class="ctas"><button class="btn red" onclick="bookCall()">Book the Synsera mock session</button><button class="btn ghost" onclick="pick('site')">See the client-facing page</button><button class="btn ghost" onclick="pick('commercial')">See billing flexibility</button></div>`;

v class="cc"><b>Northbridge Insurance</b><span>Financial services &middot; about 12,000 seats &middot; E5</span></div><div class="m"><div><b>&lt;40%</b><span>E5 used</span></div><div><b>9</b><span>pillars</span></div><div><b>1 to 5</b><span>free to SOWs</span></div></div></div><div class="jrny">${J.map(s=>`<div class="jstep ${s[2]}"><div class="jnode">${s[0]}</div><div class="jcard"><div class="jh"><b>${s[1]}</b><span class="tg">${s[2]==='free'?'Complimentary':s[2]==='opt'?'Recurring':'Scoped SOW'}</span></div><div class="jwhat">${s[3]}</div><div class="jgrid"><div class="jbox client"><b>Client receives</b>${s[4]}</div><div class="jbox syn"><b>Synsera receives</b>${s[5]}</div></div></div></div>`).join('')}</div><div class="valuebox" style="margin-top:22px"><div class="vl">The outcome for Synsera</div><p>One complimentary Health Check became a Discovery, three scoped SOWs, and a managed annuity. Synsera owned the relationship throughout and saw every step. That is your funnel, running.</p></div>`;}
    if(id==='overview')return `<span class="kick red">The Microsoft Security Practice at Synsera</span><h1>Realize the Microsoft security you <span class="g">already own.</span></h1><p class="lead">A senior, governance-led Microsoft security practice, built for the AI era and current with Microsoft in 2026. We meet clients where they are, activate the security already sitting in Microsoft E5, and deliver proportionately for mid-market and regulated sectors, from a complimentary Health Check through to managed operations.</p><div class="ctas"><button class="btn red" onclick="bookCall()">Book a discovery call</button><button class="btn ghost" onclick="pick('lifecycle')">See how it works</button></div><div class="free">&#9679;&nbsp; Start with a <b>complimentary Health Check</b>. No cost, no obligation.</div><div class="abar red" style="margin-top:44px"></div><span class="kick red">A proven model</span><h2>Delivered across many industries, with senior depth</h2><p class="lead">A repeatable, professional-services model that has delivered successfully across healthcare, government, finance, and manufacturing.</p><div class="statrow"><div class="stt"><b>18+</b><span>Years MS security</span></div><div class="stt"><b>100s</b><span>Enterprise deployments</span></div><div class="stt"><b>9</b><span>MCRA pillars</span></div><div class="stt"><b>USA + India</b><span>Certified experts</span></div></div><p class="hint" style="margin-top:10px">Deployment depth across healthcare, government, finance, and manufacturing. Named references available under NDA.</p><div class="lbl2" style="margin-top:26px;color:var(--red)">How an engagement flows</div><div class="pflow">${stages.map((s)=>`<span class="pf ${s.cls}">${s.t}</span>`).join('<span class="pfsep">&rsaquo;</span>')}</div><p class="hint" style="margin-top:10px">Pre-Health Check and Health Check are complimentary. Consulting and guidance begin at Discovery.</p><div class="abar red" style="margin-top:40px"></div><span class="kick red"     if(id==='cover')return `<div class="abar red"></div><span class="kick red">What we cover</span><h2>Nine pillars, aligned to the Microsoft reference architecture</h2><p class="lead">Every engagement maps to the Microsoft Cybersecurity Reference Architecture, so you get a complete and defensible picture, from assessment through implementation.</p><p class="hint">Click any pillar to see what it covers.</p>${pillarGrid(false)}`;

    if(id==='portal')return `<div class="abar az"></div><span class="kick az">Working together &middot; the SaaS platform</span><h2>The Foxtcon Security Portal</h2><p class="lead">Think of it as an elevation of a project tracker like Smartsheet: a live view of exactly where each client project stands, in Phase 1 build now. Partner and client logins, real-time status, and the ability to raise questions and reprioritise, with our team assisting.</p>${portalHTML}<div class="g3" style="margin-top:24px"><div class="card"><h3><span class="num az">1</span>Partner login</h3><p>Synsera sees every client project, its stage, deliverables, and next actions, across the whole account base.</p></div><div class="card"><h3><span class="num az">2</span>Client login</h3><p>Where useful, the client gets a view of exactly where their project stands and what comes next.</p></div><div class="card"><h3><span class="num az">3</span>Live status</h3><p>An elevation of a project tracker: real-time stage, RAG status, milestones, and the deliverable at each step.</p></div><div class="card"><h3><span class="num az">4</span>Raise &amp; reprioritise</h3><p>Raise questions and change priorities in the portal; our team picks them up and assists, no long email chains.</p></div><div class="card"><h3><span class="num az">5</span>One place, end to end</h3><p>Project management through delivery in one view: PMO, architect, engineer, and account management aligned.</p></div><div class="card"><h3><span class="num az">6</span>Full transparency</h3><p>You and the client always know where things stand, so trust stays high and decisions stay fast.</p></div></div>`;

foundations ready first. Current with Microsoft in 2026, including Agent ID, Agent 365, and unified DSPM.</p></div><div class="card"><h3>&#128737;&#65039; Senior and accountable</h3><p>A principal architect leads every engagement. Your data never leaves your own Microsoft tenant. Delivery is assured, not handed off to juniors.</p></div><div class="card"><h3>&#128200; From free to fully secured</h3><p>Start with the free Health Check and go only as far as you choose, each step scoped and agreed up front.</p></div></div><div style="margin-top:30px"><span class="kick red">What we cover</span><h3 style="font-size:22px;letter-spacing:-.3px;margin:2px 0 6px">Nine security domains, aligned to Microsoft</h3><p class="lead" style="font-size:14px">From identity and data to AI, we cover the full Microsoft Cybersecurity Reference Architecture, so nothing is left exposed. The Health Check scores you across all nine.</p><div class="pill-g">${PILLARDEF.map(p=>`<div class="pl"><div class="bg">${p[0]}</div><div><h4>${p[1]}</h4><span>${p[2]}</span></div></div>`).join('')}</div></div><div class="ctas" style="margin-top:24px;justify-content:center;display:flex"><button class="btn red" onclick="healthCheck()">See where you stand. Book your free Health Check</button></div><p class="hint" style="margin-top:18px;text-align:center">Microsoft Security Practice &middot; Synsera</p></div></div><p class="hint" style="margin-top:14px">Lift this section onto your site, or ask us to export it as a standalone page for you.</p>`;

function fxPush(cls,html){const b=document.getElementById('chatbody');const d=document.createElement('div');d.className='msg '+cls;d.innerHTML=html;b.appendChild(d);b.scrollTop=b.scrollHeight;}

function fxAnswer(q){q=' '+q.toLowerCase()+' ';let best=null,score=0;for(const it of FKB){let s=0;for(const k of it.k){if(q.indexOf(k)>=0)s+=k.length;}if(s>score){score=s;best=it;}}return (best&&score>0)?best.a:B("Great question, and I want to get it exactly right.",["I can cover the eight stages, delivery and team, and data residency","How projects are scoped and billed, and how the pipeline grows","The portal, and the latest Microsoft security to 2026","For anything specific to your client, VJ will give you a precise answer"],VJL);}
